<body>
<a href="index.php">Go to page 1</a> <!-- This is a link to home relative link -->
<br>

<div class="pizza-image">
    <h1>Order a Pizza</h1>
   <img src="pizza.jpg" alt="Pizza Image"> <!-- This is an image tag --> 
</div>


<form action="http://blackgoosebistro.com/pizza.php" method="post">
    <div class="customer-info">
        <p> Please give your name. </p>
            <input type="text" name="customername" placeholder="Enter your name">
        <p> Please give your address. </p>
            <input type="text" name="address" placeholder="Enter your address">
        <p> Please give your phone number. </p>
            <input type="text" name="telephone" placeholder="Enter your phone number"> 
        <p> Please give your email. </p>
            <input type="email" name="email" placeholder="Enter your email">
        <p> Please give your delivery instructions. </p>
            <input type="text" name="instructions" placeholder="Enter delivery instructions">
    </div>

    <div class="pizza-info">
        <p><strong>Please give your pizza type. </strong></p>
        
        <p> Crust Types </p>
        <select name="crust">
            <option value="thin">Thin</option>
            <option value="thick">Thick</option>
            <option value="stuffed">Stuffed</option>
        </select>

        <p> Toppings </p>
            <input type="checkbox" name="toppings[]" value="pineapple"> Pineapple<br>
            <input type="checkbox" name="toppings[]" value="mushrooms"> Mushrooms<br>
            <input type="checkbox" name="toppings[]" value="peppers"> Peppers<br>

        <p> Number of pizzas </p>
            <input type="number" name="pizzas" min="1" max="10">
    </div>

    <br>
    <br>
    <input type="submit" value="Submit">
</form>

</body>
